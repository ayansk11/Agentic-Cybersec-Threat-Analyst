<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architecture — Agentic Cybersecurity Threat Analyst</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e;
    --blue: #58a6ff; --green: #3fb950; --purple: #bc8cff;
    --orange: #d29922; --cyan: #39d2c0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; overflow-x: hidden; }
  header { text-align: center; padding: 40px 20px 10px; }
  header h1 { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
  header p { color: var(--muted); font-size: 14px; max-width: 550px; margin: 0 auto; }
  .controls { display: flex; justify-content: center; gap: 10px; padding: 16px; flex-wrap: wrap; }
  .controls button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s;
  }
  .controls button:hover { border-color: var(--blue); color: var(--blue); }
  .controls button.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .diagram-wrap { display: flex; justify-content: center; padding: 10px 20px; }
  svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }

  .node { cursor: pointer; transition: filter 0.25s; }
  .node:hover .node-bg { filter: brightness(1.3); }
  .node:hover .node-border { stroke-width: 2.5; }
  .node.selected .node-border { stroke-width: 3; }
  .node.selected .node-bg { filter: brightness(1.4); }

  @keyframes flow { 0% { offset-distance: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
  .particle { offset-rotate: 0deg; animation: flow 1.2s linear forwards; }

  .info-panel {
    max-width: 800px; margin: 16px auto; padding: 20px 24px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    display: none; transition: all 0.3s;
  }
  .info-panel.visible { display: block; }
  .info-panel h3 { margin-bottom: 6px; font-size: 15px; }
  .info-panel p { color: var(--muted); font-size: 13px; line-height: 1.6; }
  .info-panel .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .info-panel .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }

  .legend { display: flex; justify-content: center; gap: 20px; padding: 12px 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

  footer { text-align: center; padding: 30px 20px; color: var(--muted); font-size: 13px; }
  footer a { color: var(--blue); text-decoration: none; }
</style>
</head>
<body>

  <p>Click any node for details. Use the controls to explore each agent.</p>

  { edges: ['e-qdrant-mitre'], glow: 'qdrant', dur: 500 },
  { edges: ['e-a2-a3'], glow: 'agent2', dur: 600 },
  { edges: ['e-a3-llm'], glow: 'agent3', dur: 800 },
];

var selectedNode = null;
var animating = false;
var animPhase = -1;
var animTimer = null;

document.querySelectorAll('.node').forEach(function(el) {
  el.addEventListener('click', function() {
    var id = el.getAttribute('data-id');
    stopAnimation();
    selectNode(id);
    applyGlow(id);
    document.querySelectorAll('.controls button').forEach(function(b) { b.classList.remove('active'); });
    if (id === 'agent1') setActive('btn-agent1');
    else if (id === 'agent2') setActive('btn-agent2');
    else if (id === 'agent3') setActive('btn-agent3');
  });
});

function selectNode(id) {
  document.querySelectorAll('.node').forEach(function(n) { n.classList.remove('selected'); });
  var el = document.querySelector('.node[data-id="' + id + '"]');
  if (el) el.classList.add('selected');
  selectedNode = id;
  showInfo(id);
}

function clearSelection() {
  document.querySelectorAll('.node').forEach(function(n) { n.classList.remove('selected'); });
  selectedNode = null;
  hideInfo();
  clearGlows();
}

function showInfo(id) {
  var n = nodeInfo[id];
  if (!n) return;
  var panel = document.getElementById('info');
  var title = document.getElementById('info-title');
  var desc = document.getElementById('info-desc');
  var tags = document.getElementById('info-tags');
  title.textContent = n.title;
  title.style.color = n.color;
  desc.textContent = n.desc;
  while (tags.firstChild) tags.removeChild(tags.firstChild);
  n.tags.forEach(function(t) {
    var span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    span.style.background = n.color + '22';
    span.style.color = n.color;
    span.style.border = '1px solid ' + n.color + '44';
    tags.appendChild(span);
  });
  panel.classList.add('visible');
}

function hideInfo() { document.getElementById('info').classList.remove('visible'); }

function applyGlow(nodeId) {
  clearGlows();
  var el = document.querySelector('.node[data-id="' + nodeId + '"] .node-border');
  if (!el) return;
  var n = nodeInfo[nodeId];
  if (!n) return;
  var color = n.color;
  var filterName = '';
  if (color === '#58a6ff') filterName = 'glow-blue';
  else if (color === '#3fb950') filterName = 'glow-green';
  else if (color === '#bc8cff') filterName = 'glow-purple';
  else if (color === '#d29922') filterName = 'glow-orange';
  else if (color === '#39d2c0') filterName = 'glow-cyan';
  if (filterName) el.setAttribute('filter', 'url(#' + filterName + ')');
  el.setAttribute('stroke-width', '3');
}

function clearGlows() {
  document.querySelectorAll('.node-border').forEach(function(el) {
    el.removeAttribute('filter');
    el.setAttribute('stroke-width', '1.5');
  });
}

function spawnParticle(edgeId, color, duration) {
  var edge = document.getElementById(edgeId);
  if (!edge) return;
  var container = document.getElementById('particles');
  var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('r', '4');
  circle.setAttribute('fill', color || '#fff');
  circle.classList.add('particle');
  var pathData;
  if (edge.tagName === 'line') {
    var x1 = edge.getAttribute('x1'), y1 = edge.getAttribute('y1');
    var x2 = edge.getAttribute('x2'), y2 = edge.getAttribute('y2');
    pathData = 'M' + x1 + ',' + y1 + ' L' + x2 + ',' + y2;
  } else if (edge.tagName === 'path') {
    pathData = edge.getAttribute('d');
  }
  circle.style.offsetPath = "path('" + pathData + "')";
  circle.style.animationDuration = (duration || 800) + 'ms';
  container.appendChild(circle);
  setTimeout(function() { if (circle.parentNode) circle.parentNode.removeChild(circle); }, duration || 800);
}

function startAnimation() {
  stopAnimation();
  animating = true;
  animPhase = 0;
  hideInfo();
  runPhase();
}

function runPhase() {
  if (!animating || animPhase >= phases.length) {
    if (animating) { animPhase = 0; runPhase(); }
    return;
  }
  var phase = phases[animPhase];
  applyGlow(phase.glow);
  var n = nodeInfo[phase.glow];
  var color = n ? n.color : '#fff';
  phase.edges.forEach(function(eid) { spawnParticle(eid, color, phase.dur); });
  animTimer = setTimeout(function() { animPhase++; runPhase(); }, phase.dur + 100);
}

function stopAnimation() {
  animating = false;
  if (animTimer) clearTimeout(animTimer);
  animTimer = null;
  clearGlows();
  var container = document.getElementById('particles');
  while (container.firstChild) container.removeChild(container.firstChild);
}

function setActive(id) {
  document.querySelectorAll('.controls button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

document.getElementById('btn-animate').addEventListener('click', function() {
  clearSelection(); startAnimation(); setActive('btn-animate');
});
document.getElementById('btn-agent1').addEventListener('click', function() {
  stopAnimation(); selectNode('agent1'); applyGlow('agent1'); setActive('btn-agent1');
  ['e-a1-nvd', 'e-a1-kev', 'e-a1-otx', 'e-a1-tf'].forEach(function(eid) { spawnParticle(eid, '#d29922', 1200); });
});
document.getElementById('btn-agent2').addEventListener('click', function() {
  stopAnimation(); selectNode('agent2'); applyGlow('agent2'); setActive('btn-agent2');
  ['e-a2-qdrant', 'e-a2-llm'].forEach(function(eid) { spawnParticle(eid, '#39d2c0', 1200); });
});
document.getElementById('btn-agent3').addEventListener('click', function() {
  stopAnimation(); selectNode('agent3'); applyGlow('agent3'); setActive('btn-agent3');
  spawnParticle('e-a3-llm', '#39d2c0', 1200);
});

document.getElementById('diagram').addEventListener('click', function(e) {
  if (!e.target.closest('.node')) {
    clearSelection();
    startAnimation();
    setActive('btn-animate');
  }
});

// Auto-start animation on page load
startAnimation();
</script>
</body>
</html>
